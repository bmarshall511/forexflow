<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FXFlow — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: #a1a1aa;
      line-height: 1.5;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #fafafa;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #27272a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>FXFlow requires an internet connection to display live trading data. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
