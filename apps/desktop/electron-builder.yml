appId: com.fxflow.desktop
productName: FXFlow
directories:
  buildResources: assets
  output: release

# Include daemon and web app in the bundle
extraResources:
  - from: ../../apps/daemons
    to: daemons
    filter:
      - "**/*"
      - "!node_modules"
  - from: ../../apps/web/.next
    to: web/.next
    filter:
      - "**/*"
  - from: ../../apps/web/public
    to: web/public
    filter:
      - "**/*"

mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false
  # No code signing — users must right-click > Open on first launch
  identity: null

dmg:
  title: FXFlow
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Auto-updater checks GitHub Releases
publish:
  provider: github
  owner: "${GH_OWNER}"
  repo: "${GH_REPO}"

# Do not sign or notarize (open-source, no Apple Developer account)
afterSign: null
