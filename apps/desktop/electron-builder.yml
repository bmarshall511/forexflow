appId: com.fxflow.desktop
productName: FXFlow
directories:
  buildResources: assets
  output: release

# Include daemon and web app in the bundle
# Web: Next.js standalone output (self-contained server + node_modules)
# Daemon: pnpm deploy output (self-contained with all deps, no symlinks)
extraResources:
  - from: ../../apps/web/.next/standalone
    to: web-standalone
    filter:
      - "**/*"
  - from: ../../apps/web/.next/static
    to: web-standalone/apps/web/.next/static
    filter:
      - "**/*"
  - from: ../../apps/web/public
    to: web-standalone/apps/web/public
    filter:
      - "**/*"
  - from: daemon-bundle
    to: daemon-bundle
    filter:
      - "**/*"

mac:
  category: public.app-category.finance
  icon: assets/icon.icns
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false
  # No code signing — users must right-click > Open on first launch
  identity: null

dmg:
  title: FXFlow
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Auto-updater checks GitHub Releases
publish:
  provider: github
  owner: "${env.GH_OWNER}"
  repo: "${env.GH_REPO}"

# Do not sign or notarize (open-source, no Apple Developer account)
afterSign: null
