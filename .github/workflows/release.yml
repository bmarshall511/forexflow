name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip release commits to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Determine version bump
        id: bump
        run: |
          # Find the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Get commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="none"

          if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|perf)(\(.+\))?:"; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Detected bump type: $BUMP"

      - name: Calculate new version
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ steps.bump.outputs.bump }}"

          case "$BUMP" in
            major)
              # While pre-1.0, cap major bumps to minor
              if [ "$MAJOR" -eq 0 ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
              else
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
              fi
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Bump version in all package.json files
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"

          # Update root package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update all workspace package.json files
          for PKG_FILE in apps/*/package.json packages/*/package.json; do
            if [ -f "$PKG_FILE" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$PKG_FILE', 'utf8'));
                pkg.version = '$NEW_VERSION';
                fs.writeFileSync('$PKG_FILE', JSON.stringify(pkg, null, 2) + '\n');
              "
            fi
          done

          # Update manifest.json
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('apps/web/public/manifest.json', 'utf8'));
            manifest.version = '$NEW_VERSION';
            fs.writeFileSync('apps/web/public/manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Generate changelog
        if: steps.bump.outputs.bump != 'none'
        run: pnpm changelog

      - name: Commit, tag, and push
        if: steps.bump.outputs.bump != 'none'
        env:
          LEFTHOOK: "0"
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.bump.outputs.latest_tag }}"

          # Generate release notes from commits
          NOTES=$(git log "${PREV_TAG}..HEAD~1" --pretty=format:"- %s" 2>/dev/null || echo "- Initial release")

          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes "$NOTES" \
            --latest

    outputs:
      released: ${{ steps.bump.outputs.bump != 'none' }}
      version: ${{ steps.version.outputs.version }}

  # Build desktop DMGs and attach to the release
  desktop:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/desktop.yml
    with:
      tag: v${{ needs.release.outputs.version }}
