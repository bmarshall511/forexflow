name: release

# Semantic-release drives version bumps + changelog + GitHub Release.
# Triggered on push to main (post-cutover) and manually.
#
# INERT during the rebuild — the release step skips when there's no
# package.json. When the maintainer decides v3 is ready and merges
# to main, this workflow takes over release automation.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  guard:
    name: Check if releasable
    runs-on: ubuntu-latest
    outputs:
      releasable: ${{ steps.check.outputs.releasable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect release readiness
        id: check
        run: |
          if [ -f "package.json" ] && [ -f ".releaserc.json" ]; then
            echo "releasable=true" >> "$GITHUB_OUTPUT"
          else
            echo "releasable=false" >> "$GITHUB_OUTPUT"
            echo "Not releasable yet — skipping release (rebuild in progress)"
          fi

  release:
    name: semantic-release
    needs: guard
    if: needs.guard.outputs.releasable == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
