name: Desktop Build

on:
  # Called by release workflow after creating a GitHub Release
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.0)"
        required: true
        type: string
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload to (leave empty to skip upload)"
        type: string
        default: ""

concurrency:
  group: desktop-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
          - arch: x64

    # All macOS runners are now ARM — cross-compile x64 via electron-builder
    runs-on: macos-latest

    env:
      DATABASE_URL: "file:./dev.db"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Generate Prisma client (needed for daemon build)
      - name: Generate Prisma client
        run: pnpm --filter @fxflow/db db:generate

      # Build shared packages first
      - name: Build packages
        run: |
          pnpm --filter @fxflow/types build
          pnpm --filter @fxflow/shared build
          pnpm --filter @fxflow/db build

      # Build the web app (Next.js)
      - name: Build web app
        run: pnpm --filter @fxflow/web build

      # Build the daemon
      - name: Build daemon
        run: pnpm --filter @fxflow/daemons build

      # Compile Electron main/preload
      - name: Build desktop app
        working-directory: apps/desktop
        run: pnpm electron:build

      # Package DMG for the target arch
      - name: Package DMG
        working-directory: apps/desktop
        env:
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
        run: pnpm electron:package --${{ matrix.arch }}

      # Upload artifacts for inspection
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FXFlow-${{ matrix.arch }}
          path: apps/desktop/release/*.dmg
          if-no-files-found: error

      # Attach to GitHub Release
      - name: Upload to release
        if: inputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dmg in apps/desktop/release/*.dmg; do
            gh release upload "${{ inputs.tag }}" "$dmg" --clobber
          done
