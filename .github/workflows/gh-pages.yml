name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fxflow/db db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Generate TypeDoc API docs
        run: pnpm docs:api

      - name: Build Astro site
        run: pnpm --filter @fxflow/site build
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Copy TypeDoc output into site
        run: |
          mkdir -p site/dist/api
          if [ -d "docs/api" ]; then
            cp -r docs/api/* site/dist/api/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
