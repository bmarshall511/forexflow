pre-commit:
  commands:
    prettier:
      glob: "*.{ts,tsx,js,mjs,json,md,yml,yaml,css}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  piped: true
  commands:
    prisma-generate:
      run: DATABASE_URL=file:./dev.db pnpm --filter @fxflow/db db:generate
      priority: 1
    format-check:
      run: pnpm format:check
      priority: 2
    lint:
      run: pnpm turbo lint
      priority: 2
    typecheck:
      run: pnpm turbo typecheck
      priority: 2
    test:
      run: pnpm turbo test
      priority: 2
    prisma-drift:
      run: cd packages/db && pnpm prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code
      priority: 3
