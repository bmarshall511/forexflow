pre-commit:
  commands:
    prettier:
      glob: "*.{ts,tsx,js,mjs,json,md,yml,yaml,css}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  piped: true
  commands:
    # Both prisma hooks use a throwaway DB path under /tmp so they never
    # create or touch .db files inside the repo. `prisma generate` and
    # `prisma migrate diff --from-migrations --to-schema` need DATABASE_URL
    # to parse but don't actually connect to any live database — the path
    # just has to be valid.
    prisma-generate:
      run: DATABASE_URL="file:${TMPDIR:-/tmp}/fxflow-prisma-hook.db" pnpm --filter @fxflow/db db:generate
      priority: 1
    format-check:
      run: pnpm format:check
      priority: 2
    lint:
      run: pnpm turbo lint
      priority: 2
    typecheck:
      run: pnpm turbo typecheck
      priority: 2
    test:
      run: pnpm turbo test
      priority: 2
    prisma-drift:
      run: cd packages/db && DATABASE_URL="file:${TMPDIR:-/tmp}/fxflow-prisma-hook.db" pnpm prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code
      priority: 3
